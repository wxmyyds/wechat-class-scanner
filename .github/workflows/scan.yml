name: Scan WeChat APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      apk_urls:
        description: 'Comma-separated URLs to APKs (optional)'
        required: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download scanner
        run: |
          wget -q https://github.com/wxmyyds/wechat-class-scanner/releases/latest/download/scanner-all.jar -O scanner.jar || true
          if [ ! -f scanner.jar ] || [ ! -s scanner.jar ]; then
            echo "Pre-built scanner not found, building from source..."
            git clone https://github.com/wxmyyds/wechat-class-scanner.git /tmp/scanner
            cd /tmp/scanner
            chmod +x gradlew
            ./gradlew shadowJar --no-daemon
            cp /tmp/scanner/build/libs/*-all.jar scanner.jar
          fi

      - name: Prepare APKs
        id: apks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p apks

          # Case 1: Release trigger — download assets from the triggering release
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Downloading APKs from release ${{ github.event.release.tag_name }}..."
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          # Case 2: Manual trigger with URLs — download from provided URLs
          elif [ -n "${{ github.event.inputs.apk_urls }}" ]; then
            IFS=',' read -ra URLS <<< "${{ github.event.inputs.apk_urls }}"
            for url in "${URLS[@]}"; do
              echo "Downloading $url"
              wget -q "$url" -O "apks/$(basename "$url")" || true
            done
            echo "count=$(ls apks/*.apk apks/*.apks 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT
            exit 0
          # Case 3: Manual trigger without URLs — download from latest release
          else
            echo "No URLs provided, downloading APKs from latest release..."
            RELEASE_TAG=$(curl -sL -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | grep '"tag_name"' | head -1 | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')
            echo "Latest release: $RELEASE_TAG"
          fi

          # Download all assets from the release
          curl -sL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG/assets" \
            | grep '"browser_download_url"' \
            | sed -E 's/.*"browser_download_url": *"([^"]+)".*/\1/' \
            | while read -r url; do
              echo "  Downloading $url"
              wget -q "$url" -O "apks/$(basename "$url")" || true
            done

          echo "count=$(ls apks/*.apk apks/*.apks 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      - name: Extract .apks bundles
        if: steps.apks.outputs.count > 0
        run: |
          for bundle in apks/*.apks; do
            [ -f "$bundle" ] || continue
            echo "Extracting $bundle..."
            unzip -o -q "$bundle" -d apks/ 2>/dev/null || true
          done
          rm -f apks/*.apks
          echo "Final APK count: $(ls apks/*.apk 2>/dev/null | wc -l)"

      - name: Run scanner
        if: steps.apks.outputs.count > 0
        run: |
          java -jar scanner.jar --apks-dir apks --out classes.txt

      - name: Upload classes.txt to release
        if: steps.apks.outputs.count > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            gh release upload "${{ github.event.release.tag_name }}" classes.txt --clobber
          else
            gh release upload "$(gh release list --limit 1 --json tagName -q '.[0].tagName')" classes.txt --clobber
          fi
